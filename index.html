<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>كاظمة | شخصيات وثّقت الكويت — أرشيف كامل</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700;800&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#0F1923;--bg2:#162231;--bg3:#1C2D40;--bg4:#111D29;
    --gold:#C8A45C;--gd:rgba(200,164,92,.12);--gg:rgba(200,164,92,.25);
    --tx:#E8E0D0;--td:#8A9AB0;--tb:#F5F0E8;
    --blue:#4A90D9;--green:#5CAA6E;--red:#C85C5C;--purple:#9B6EC8;
    --bd:rgba(200,164,92,.1);--gl:rgba(22,34,49,.92);
  }
  body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 10%,rgba(200,164,92,.04) 0%,transparent 50%),radial-gradient(ellipse at 80% 90%,rgba(74,144,217,.03) 0%,transparent 50%);pointer-events:none}
  a{color:var(--gold);text-decoration:none}
  a:hover{text-decoration:underline}

  /* HERO */
  .hero{text-align:center;padding:48px 20px 38px;background:linear-gradient(180deg,rgba(200,164,92,.06) 0%,transparent 100%);border-bottom:1px solid var(--bd);position:relative}
  .hero::after{content:'';position:absolute;bottom:0;left:15%;right:15%;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
  .bc{font-size:13px;color:var(--td);margin-bottom:14px}
  .bc a{color:var(--gold)} .bc span{margin:0 6px}
  .hero h1{font-family:'Amiri',serif;font-size:clamp(26px,5vw,42px);color:var(--tb);margin-bottom:8px}
  .hero h1 em{color:var(--gold);font-style:normal}
  .hero .ld{font-size:15px;color:var(--td);max-width:680px;margin:0 auto 22px;line-height:1.75}
  .sts{display:flex;justify-content:center;gap:28px;flex-wrap:wrap}
  .st b{font-family:'Amiri',serif;font-size:26px;color:var(--gold);display:block}
  .st small{font-size:12px;color:var(--td)}

  /* FILTERS */
  .flt{position:sticky;top:0;z-index:100;background:var(--gl);backdrop-filter:blur(20px);border-bottom:1px solid var(--bd);padding:11px 20px}
  .flt-in{max-width:1100px;margin:0 auto;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .fb{padding:6px 13px;border-radius:18px;border:1px solid var(--bd);background:0;color:var(--td);font-family:inherit;font-size:12px;cursor:pointer;transition:.25s}
  .fb:hover{border-color:var(--gold);color:var(--gold)}
  .fb.on{background:var(--gold);color:var(--bg);border-color:var(--gold);font-weight:500}
  .sw{flex:1;min-width:160px;position:relative}
  .sw input{width:100%;padding:7px 14px 7px 34px;border-radius:18px;border:1px solid var(--bd);background:rgba(255,255,255,.04);color:var(--tx);font-family:inherit;font-size:13px;outline:0}
  .sw input:focus{border-color:var(--gold)}
  .sw svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--td)}

  /* MAIN */
  .main{max-width:1100px;margin:0 auto;padding:28px 20px 60px}

  /* PERSON ENTRY */
  .pe{background:var(--bg2);border:1px solid var(--bd);border-radius:16px;margin-bottom:24px;overflow:hidden;transition:border-color .3s}
  .pe:hover{border-color:var(--gg)}

  /* Header */
  .ph{display:flex;align-items:center;gap:14px;padding:18px 22px;cursor:pointer;background:rgba(200,164,92,.025);border-bottom:1px solid var(--bd)}
  .pav{width:64px;height:64px;border-radius:50%;border:2px solid rgba(200,164,92,.25);flex-shrink:0;overflow:hidden;background:linear-gradient(135deg,var(--gd),rgba(74,144,217,.1))}
  .pav img{width:100%;height:100%;object-fit:cover;filter:sepia(10%)}
  .pav.noi{display:flex;align-items:center;justify-content:center;font-family:'Amiri',serif;font-size:24px;color:var(--gold)}
  .pi{flex:1}
  .pn{font-family:'Amiri',serif;font-size:20px;font-weight:700;color:var(--tb);line-height:1.3}
  .pen{font-size:12px;color:var(--td);margin-top:2px}
  .pm{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-top:5px;font-size:12px;color:var(--td)}
  .pm .s{width:3px;height:3px;background:var(--td);border-radius:50%}
  .tg{display:inline-flex;gap:5px;flex-wrap:wrap}
  .t{font-size:10px;padding:2px 8px;border-radius:8px;border:1px solid;white-space:nowrap}
  .t-r{color:var(--blue);border-color:rgba(74,144,217,.3);background:rgba(74,144,217,.06)}
  .t-o{color:var(--green);border-color:rgba(92,170,110,.3);background:rgba(92,170,110,.06)}
  .t-p{color:var(--gold);border-color:rgba(200,164,92,.3);background:var(--gd)}
  .pt{font-size:20px;color:var(--gold);transition:transform .3s;width:28px;height:28px;display:flex;align-items:center;justify-content:center}
  .pe.open .pt{transform:rotate(180deg)}

  /* Body */
  .pb{max-height:0;overflow:hidden;transition:max-height .5s cubic-bezier(.4,0,.2,1)}
  .pe.open .pb{max-height:4000px}
  .pc{padding:22px}

  /* Article */
  .pa{font-size:15px;line-height:1.85;margin-bottom:18px}
  .pa p{margin-bottom:10px}
  .pa strong{color:var(--tb)}

  /* Info grid */
  .ig{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px;margin-bottom:18px}
  .ib{background:var(--bg4);border:1px solid var(--bd);border-radius:10px;padding:12px 14px}
  .ib-l{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--gold);margin-bottom:5px;font-weight:600}
  .ib-v{font-size:13px;color:var(--tx);line-height:1.6}

  /* Books */
  .bks{margin-bottom:18px}
  .bks-t{font-family:'Amiri',serif;font-size:17px;color:var(--gold);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--bd)}
  .bk{display:flex;gap:14px;align-items:flex-start;padding:14px 0;border-bottom:1px solid rgba(255,255,255,.03)}
  .bk:last-child{border:0}
  .bk-img{width:70px;height:95px;border-radius:4px;overflow:hidden;flex-shrink:0;background:var(--gd);border:1px solid rgba(200,164,92,.15)}
  .bk-img img{width:100%;height:100%;object-fit:cover}
  .bk-d{flex:1}
  .bk-n{font-size:15px;font-weight:600;color:var(--tb);margin-bottom:3px}
  .bk-m{font-size:13px;color:var(--td);line-height:1.6}

  /* Gallery */
  .gal{margin-bottom:18px}
  .gal-g{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}
  .gal-i{aspect-ratio:4/3;border-radius:8px;overflow:hidden;position:relative;background:var(--bg4);border:1px solid var(--bd)}
  .gal-i img{width:100%;height:100%;object-fit:cover;filter:sepia(15%) contrast(1.05);transition:transform .4s}
  .gal-i:hover img{transform:scale(1.05)}
  .gal-i .cap{position:absolute;bottom:0;left:0;right:0;padding:6px 10px;background:linear-gradient(transparent,rgba(0,0,0,.8));font-size:11px;color:#fff}
  .gal-ph{display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:11px;color:var(--td);gap:4px}
  .gal-ph svg{width:22px;height:22px;color:rgba(200,164,92,.3)}

  /* Links */
  .pls{display:flex;gap:8px;flex-wrap:wrap;padding-top:14px;border-top:1px solid var(--bd)}
  .pl{padding:7px 16px;border-radius:18px;font-size:12px;display:inline-flex;align-items:center;gap:5px;transition:.25s}
  .pl.p1{background:var(--gold);color:var(--bg);font-weight:600}
  .pl.p1:hover{opacity:.85;text-decoration:none}
  .pl.p2{border:1px solid var(--bd);color:var(--td)}
  .pl.p2:hover{border-color:var(--gold);color:var(--gold);text-decoration:none}

  /* Source */
  .src{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--td);background:rgba(255,255,255,.025);border:1px solid var(--bd);border-radius:6px;padding:5px 10px;margin-top:14px;flex-wrap:wrap}
  .src a{color:var(--gold)}
  .src-ico{flex-shrink:0}

  /* Footer */
  .ftn{max-width:1100px;margin:0 auto 50px;padding:0 20px}
  .fn{background:var(--gd);border:1px solid rgba(200,164,92,.18);border-radius:12px;padding:16px 20px;display:flex;gap:10px;align-items:flex-start;font-size:13px;line-height:1.7}
  .fn svg{flex-shrink:0;color:var(--gold);margin-top:2px}

  @media(max-width:768px){
    .ig{grid-template-columns:1fr}
    .gal-g{grid-template-columns:repeat(2,1fr)}
    .ph{flex-wrap:wrap}
    .bk{flex-direction:column}
    .bk-img{width:60px;height:80px}
  }
</style>
</head>
<body>

<!-- HERO -->
<section class="hero">
  <div class="bc"><a href="#"></a><span>•</span><a href="#"></a><span>•</span></div>
  <h1><em></em></h1>
  <p class="ld"></p>
  <div class="sts">
    <div class="st"><b></b><small></small></div>
    <div class="st"><b></b><small></small></div>
    <div class="st"><b></b><small></small></div>
  </div>
</section>

<!-- FILTERS -->
<div class="flt"><div class="flt-in">
  <button class="fb on" onclick="F('all',this)"></button>
  <button class="fb" onclick="F('dip',this)"></button>
  <button class="fb" onclick="F('doc',this)"></button>
  <button class="fb" onclick="F('pho',this)"></button>
  <button class="fb" onclick="F('aut',this)"></button>
  <div class="sw">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    <input placeholder="" oninput="S(this.value)">
  </div>
</div></div>

<!-- MAIN -->
<div class="main">

<!-- 1. HAROLD DICKSON -->
<article class="pe open" data-c="dip aut">
<div class="ph" onclick="T(this.parentElement)">
  <div class="pav"><img src="https://upload.wikimedia.org/wikipedia/commons/b/b3/H.R.P_Dickson_in_1919.JPG" alt=""></div>
  <div class="pi">
    <div class="pn"></div>
    <div class="pen">Colonel Harold R.P. Dickson - 1881–1959</div>
    <div class="pm">
      <span></span><span class="s"></span><span></span>
      <span class="tg"><span class="t t-r"></span><span class="t t-r"></span><span class="t t-p"></span></span>
    </div>
  </div>
  <div class="pt">⟨</div>
</div>
<div class="pb"><div class="pc">

  <div class="pa">
    <p><strong></strong> </p>
    <p> </p>
    <p> </p>
    <p><strong></strong>  1.3 % </p>
  </div>
</div>
</article>

</div>

<footer class="ftn">
<div class="fn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor"/><path d="M2 17L12 22L22 17" stroke="currentColor"/><path d="M2 12L12 17L22 12" stroke="currentColor"/></svg></div>
</footer>

<script>
function T(e){e.classList.toggle('open')}
function F(c,e){['all','dip','doc','pho','aut'].includes(c)?document.querySelectorAll('.pe').forEach(a=>{a.style.display=a.getAttribute('data-c').split(' ').some(x=>['all'].concat(c).includes(x))?'':'none'}):('all'.split(' ').some(x=>['all'].concat(c).includes(x))?document.querySelectorAll('.pe').forEach(a=>{a.style.display=''}):document.querySelectorAll('.pe').forEach(a=>{a.style.display=a.getAttribute('data-c').split(' ').some(x=>['all'].concat(c).includes(x))?'':'none'}));e.classList.toggle('on');document.querySelectorAll('.fb').forEach(b=>{b!==e&&b.classList.remove('on')})}
function S(q){q=q.toLowerCase();document.querySelectorAll('.pe').forEach(e=>{e.style.display=e.textContent.toLowerCase().includes(q)?'':'none'})}
</script>
</body>
</html>
